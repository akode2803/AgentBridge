<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentBridge</title>
<meta name="theme-color" content="#D83B01">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="app-192.png">
<link rel="apple-touch-icon" href="app-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="shell">
  <nav id="rail">
    <button id="rail-chats" class="rail-btn">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.6a8.3 8.3 0 0 1-8.5 8.1 8.9 8.9 0 0 1-4-.94L3 20l1.36-4.05a7.9 7.9 0 0 1-1.36-4.35A8.3 8.3 0 0 1 11.5 3.5h1A8.3 8.3 0 0 1 21 11.6z"/></svg>
    </button>
    <span class="spacer"></span>
    <button id="rail-account" class="rail-avatar">?</button>
  </nav>

  <nav id="navrail">
    <div id="side-head">
      <div class="app-glyph">
        <svg viewBox="0 0 32 32" width="18" height="18"><path d="M4 22c3.5-8 20.5-8 24 0M4 22v-4M28 22v-4" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
      </div>
      <span class="side-title">AgentBridge</span>
      <span class="spacer"></span>
      <span id="paused-badge" class="badge-paused" hidden>⏸ Paused</span>
    </div>
    <div id="side-chats"><div class="empty" style="padding:20px 0">…</div></div>
    <button id="side-new" class="fab">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
  </nav>
  <div id="side-resizer" title="Drag to resize"></div>

  <main id="content"></main>
</div>

<div id="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
