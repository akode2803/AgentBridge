<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentBridge</title>
<meta name="theme-color" content="#D83B01">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="app-192.png">
<link rel="apple-touch-icon" href="app-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="titlebar">
  <div class="app-glyph">
    <svg viewBox="0 0 32 32" width="20" height="20"><path d="M4 22c3.5-8 20.5-8 24 0M4 22v-4M28 22v-4" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
  </div>
  <span class="app-name">AgentBridge</span>
  <span class="spacer"></span>
  <span id="paused-badge" class="badge-paused" hidden>⏸ Paused</span>
</header>

<div id="shell">
  <nav id="navrail">
    <div id="side-head">
      <span class="side-title">Chats</span>
      <span class="spacer"></span>
      <button id="side-new" class="icon-btn" title="New chat">
        <svg viewBox="0 0 20 20"><path d="M4 16 14 6l2.5-1.5L18 6l-1.5 2.5L6.5 18.5H4z M3 17l1-1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div id="side-chats"><div class="empty" style="padding:20px 0">…</div></div>
    <a id="side-account" href="#/settings" title="Settings">
      <span class="acct-avatar" id="acct-avatar">?</span>
      <span id="acct-name" style="flex:1">Sign in</span>
      <svg viewBox="0 0 20 20" width="16" height="16"><circle cx="10" cy="10" r="2.6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M10 3v2.2M10 14.8V17M3 10h2.2M14.8 10H17M5.1 5.1l1.6 1.6M13.3 13.3l1.6 1.6M14.9 5.1l-1.6 1.6M6.7 13.3l-1.6 1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </a>
  </nav>

  <main id="content"></main>
</div>

<footer id="statusbar">
  <span id="status-dot" class="dot dot-grey"></span>
  <span id="status-text">connecting…</span>
  <span class="spacer"></span>
  <span id="status-versions"></span>
</footer>

<div id="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
